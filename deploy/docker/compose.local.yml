name: omniwa-local

services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    image: omniwa:local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      OMNIWA_API_RUNTIME_PROFILE: local
      OMNIWA_API_REPOSITORY_PROFILE: ${OMNIWA_API_REPOSITORY_PROFILE:-postgresql}
      OMNIWA_API_REPOSITORY_STATE_DIR: /var/lib/omniwa/repositories
      OMNIWA_POSTGRES_DATABASE_URL: postgresql://omniwa:${OMNIWA_POSTGRES_PASSWORD:-omniwa-local-password}@postgres:5432/omniwa
      OMNIWA_POSTGRES_AUTO_MIGRATE: ${OMNIWA_POSTGRES_AUTO_MIGRATE:-true}
      OMNIWA_API_HOST: 0.0.0.0
      OMNIWA_API_PORT: 3000
      OMNIWA_API_KEY: ${OMNIWA_API_KEY:-local-dev-secret-change-me}
      OMNIWA_API_KEY_ID: ${OMNIWA_API_KEY_ID:-local-dev-key}
      OMNIWA_API_KEY_KIND: ${OMNIWA_API_KEY_KIND:-admin_key}
      OMNIWA_EVENT_LOG_PATH: /var/lib/omniwa/event-log.json
    ports:
      - "${OMNIWA_API_PUBLIC_PORT:-3000}:3000"
    volumes:
      - omniwa-local-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/v1/health'',{headers:{''x-api-key'':process.env.OMNIWA_API_KEY}}).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    image: omniwa:local
    command: ["node", "apps/worker/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: development
      OMNIWA_WORKER_RUNTIME_PROFILE: local
      OMNIWA_WORKER_REPOSITORY_PROFILE: ${OMNIWA_WORKER_REPOSITORY_PROFILE:-postgresql}
      OMNIWA_WORKER_LOOP_INTERVAL_MS: ${OMNIWA_WORKER_LOOP_INTERVAL_MS:-5000}
      OMNIWA_POSTGRES_DATABASE_URL: postgresql://omniwa:${OMNIWA_POSTGRES_PASSWORD:-omniwa-local-password}@postgres:5432/omniwa
      OMNIWA_POSTGRES_AUTO_MIGRATE: ${OMNIWA_POSTGRES_AUTO_MIGRATE:-true}
    volumes:
      - omniwa-local-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy

  webhook-dispatcher:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
      target: runtime
    image: omniwa:local
    command: ["node", "apps/webhook-dispatcher/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: development
      OMNIWA_WEBHOOK_DISPATCHER_RUNTIME_PROFILE: local
      OMNIWA_WEBHOOK_DISPATCHER_REPOSITORY_PROFILE: ${OMNIWA_WEBHOOK_DISPATCHER_REPOSITORY_PROFILE:-durable-json}
      OMNIWA_WEBHOOK_DISPATCHER_REPOSITORY_STATE_DIR: /var/lib/omniwa/webhook-dispatcher
      OMNIWA_WEBHOOK_DISPATCHER_LOOP_INTERVAL_MS: ${OMNIWA_WEBHOOK_DISPATCHER_LOOP_INTERVAL_MS:-5000}
      OMNIWA_WEBHOOK_DISPATCHER_RETRY_DELAY_MS: ${OMNIWA_WEBHOOK_DISPATCHER_RETRY_DELAY_MS:-1000}
    volumes:
      - omniwa-local-data:/var/lib/omniwa

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: omniwa
      POSTGRES_USER: omniwa
      POSTGRES_PASSWORD: ${OMNIWA_POSTGRES_PASSWORD:-omniwa-local-password}
    ports:
      - "127.0.0.1:${OMNIWA_POSTGRES_PUBLIC_PORT:-55432}:5432"
    volumes:
      - omniwa-local-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniwa -d omniwa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  omniwa-local-data:
  omniwa-local-postgres:
