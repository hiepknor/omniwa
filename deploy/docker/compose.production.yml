name: omniwa-production

services:
  api:
    image: ${OMNIWA_IMAGE:?Set OMNIWA_IMAGE to a built OmniWA image tag}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      OMNIWA_API_RUNTIME_PROFILE: ${OMNIWA_API_RUNTIME_PROFILE:-production}
      OMNIWA_API_REPOSITORY_PROFILE: postgresql
      OMNIWA_POSTGRES_DATABASE_URL: ${OMNIWA_POSTGRES_DATABASE_URL:?Set OMNIWA_POSTGRES_DATABASE_URL for PostgreSQL repository profile}
      OMNIWA_POSTGRES_AUTO_MIGRATE: "false"
      OMNIWA_API_HOST: 0.0.0.0
      OMNIWA_API_PORT: 3000
      OMNIWA_API_KEY_HASH: ${OMNIWA_API_KEY_HASH:?Set OMNIWA_API_KEY_HASH from a protected secret source}
      OMNIWA_API_HEALTHCHECK_KEY: ${OMNIWA_API_HEALTHCHECK_KEY:?Set OMNIWA_API_HEALTHCHECK_KEY matching the active API key hash}
      OMNIWA_API_KEY_ID: ${OMNIWA_API_KEY_ID:?Set OMNIWA_API_KEY_ID for the active API key}
      OMNIWA_API_KEY_KIND: ${OMNIWA_API_KEY_KIND:-admin_key}
      OMNIWA_API_KEY_SCOPES: ${OMNIWA_API_KEY_SCOPES:-admin:*}
      OMNIWA_API_QUEUE_PROFILE: durable-worker-job
      OMNIWA_API_RATE_LIMIT_BACKEND: redis
      OMNIWA_API_RATE_LIMIT_REDIS_URL: ${OMNIWA_API_RATE_LIMIT_REDIS_URL:?Set OMNIWA_API_RATE_LIMIT_REDIS_URL}
      OMNIWA_API_RATE_LIMIT_MAX_REQUESTS: ${OMNIWA_API_RATE_LIMIT_MAX_REQUESTS:?Set OMNIWA_API_RATE_LIMIT_MAX_REQUESTS}
      OMNIWA_API_RATE_LIMIT_WINDOW_MS: ${OMNIWA_API_RATE_LIMIT_WINDOW_MS:?Set OMNIWA_API_RATE_LIMIT_WINDOW_MS}
      OMNIWA_API_SECURITY_AUDIT_RECORDS: "true"
      OMNIWA_API_RESOURCE_OWNERSHIP_REPOSITORY: "true"
      OMNIWA_API_METRICS_JSONL_PATH: /var/lib/omniwa/observability/api-metrics.jsonl
      OMNIWA_EVENT_LOG_BACKEND: postgresql
    ports:
      - "127.0.0.1:${OMNIWA_API_PUBLIC_PORT:-3000}:3000"
    volumes:
      - omniwa-production-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/v1/health'',{headers:{''x-api-key'':process.env.OMNIWA_API_HEALTHCHECK_KEY}}).then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker:
    image: ${OMNIWA_IMAGE:?Set OMNIWA_IMAGE to a built OmniWA image tag}
    command: ["node", "apps/worker/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Worker production profile still fails closed until provider-runtime IPC/shared socket
      # ownership is implemented. Use local only for a controlled pilot.
      OMNIWA_WORKER_RUNTIME_PROFILE: ${OMNIWA_WORKER_RUNTIME_PROFILE:?Set local for controlled pilot; production remains blocked until worker provider IPC is implemented}
      OMNIWA_WORKER_REPOSITORY_PROFILE: postgresql
      OMNIWA_WORKER_QUEUE_PROFILE: durable-worker-job
      OMNIWA_WORKER_PROVIDER_MODE: ${OMNIWA_WORKER_PROVIDER_MODE:-multi-process-unsupported}
      OMNIWA_POSTGRES_DATABASE_URL: ${OMNIWA_POSTGRES_DATABASE_URL:?Set OMNIWA_POSTGRES_DATABASE_URL}
      OMNIWA_POSTGRES_AUTO_MIGRATE: "false"
      OMNIWA_EVENT_LOG_PATH: /var/lib/omniwa/event-log.json
    volumes:
      - omniwa-production-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  webhook-dispatcher:
    image: ${OMNIWA_IMAGE:?Set OMNIWA_IMAGE to a built OmniWA image tag}
    command: ["node", "apps/webhook-dispatcher/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      OMNIWA_WEBHOOK_DISPATCHER_RUNTIME_PROFILE: production
      OMNIWA_WEBHOOK_DISPATCHER_REPOSITORY_PROFILE: postgresql
      OMNIWA_WEBHOOK_DISPATCHER_QUEUE_PROFILE: durable-worker-job
      OMNIWA_WEBHOOK_DISPATCHER_HTTP_GATEWAY: fetch
      OMNIWA_WEBHOOK_DISPATCHER_LOOP_INTERVAL_MS: ${OMNIWA_WEBHOOK_DISPATCHER_LOOP_INTERVAL_MS:-5000}
      OMNIWA_WEBHOOK_DISPATCHER_RETRY_DELAY_MS: ${OMNIWA_WEBHOOK_DISPATCHER_RETRY_DELAY_MS:-1000}
      OMNIWA_WEBHOOK_SIGNING_SECRET_NAME: OMNIWA_WEBHOOK_SIGNING_SECRET
      OMNIWA_WEBHOOK_SIGNING_SECRET: ${OMNIWA_WEBHOOK_SIGNING_SECRET:?Set OMNIWA_WEBHOOK_SIGNING_SECRET}
      OMNIWA_WEBHOOK_DISPATCHER_METRICS_JSONL_PATH: /var/lib/omniwa/observability/webhook-dispatcher-metrics.jsonl
      OMNIWA_WEBHOOK_DISPATCHER_AUDIT_JSONL_PATH: /var/lib/omniwa/observability/webhook-dispatcher-audit.jsonl
      OMNIWA_POSTGRES_DATABASE_URL: ${OMNIWA_POSTGRES_DATABASE_URL:?Set OMNIWA_POSTGRES_DATABASE_URL}
      OMNIWA_POSTGRES_AUTO_MIGRATE: "false"
    volumes:
      - omniwa-production-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  provider-runtime:
    image: ${OMNIWA_IMAGE:?Set OMNIWA_IMAGE to a built OmniWA image tag}
    command: ["node", "apps/provider-runtime/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Provider runtime production profile still fails closed until production auth encryption
      # and distributed ownership evidence are complete. Use local only for a controlled pilot.
      OMNIWA_PROVIDER_RUNTIME_PROFILE: ${OMNIWA_PROVIDER_RUNTIME_PROFILE:?Set local for controlled pilot; production remains blocked until provider runtime production profile is enabled}
      OMNIWA_LIVE_DEMO_MODE: ${OMNIWA_LIVE_DEMO_MODE:-disabled}
      OMNIWA_RUNTIME_STATE_DIR: /var/lib/omniwa
      OMNIWA_EVENT_LOG_PATH: /var/lib/omniwa/event-log.json
      OMNIWA_PROVIDER_RUNTIME_OWNERSHIP_MODE: postgresql
      OMNIWA_PROVIDER_RUNTIME_OWNERSHIP_DATABASE_URL: ${OMNIWA_PROVIDER_RUNTIME_OWNERSHIP_DATABASE_URL:?Set OMNIWA_PROVIDER_RUNTIME_OWNERSHIP_DATABASE_URL}
      OMNIWA_BAILEYS_AUTH_STATE_PATH: /var/lib/omniwa/provider-runtime/baileys-auth-state.json
      OMNIWA_BAILEYS_AUTH_STATE_ENCRYPTION_KEY: ${OMNIWA_BAILEYS_AUTH_STATE_ENCRYPTION_KEY:?Set OMNIWA_BAILEYS_AUTH_STATE_ENCRYPTION_KEY}
    volumes:
      - omniwa-production-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  background:
    image: ${OMNIWA_IMAGE:?Set OMNIWA_IMAGE to a built OmniWA image tag}
    command: ["node", "apps/background/dist/index.js"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      OMNIWA_BACKGROUND_RUNTIME_PROFILE: production
      OMNIWA_BACKGROUND_EVENT_LOG_BACKEND: postgresql
      OMNIWA_POSTGRES_DATABASE_URL: ${OMNIWA_POSTGRES_DATABASE_URL:?Set OMNIWA_POSTGRES_DATABASE_URL}
      OMNIWA_POSTGRES_AUTO_MIGRATE: "false"
      OMNIWA_EVENT_OUTBOX_LOOP_INTERVAL_MS: ${OMNIWA_EVENT_OUTBOX_LOOP_INTERVAL_MS:-5000}
      OMNIWA_EVENT_OUTBOX_PUBLISHER_JSONL_PATH: /var/lib/omniwa/observability/event-outbox-publisher.jsonl
      OMNIWA_EVENT_OUTBOX_METRICS_JSONL_PATH: /var/lib/omniwa/observability/event-outbox-metrics.jsonl
    volumes:
      - omniwa-production-data:/var/lib/omniwa
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OMNIWA_POSTGRES_DATABASE:-omniwa}
      POSTGRES_USER: ${OMNIWA_POSTGRES_USER:?Set OMNIWA_POSTGRES_USER}
      POSTGRES_PASSWORD: ${OMNIWA_POSTGRES_PASSWORD:?Set OMNIWA_POSTGRES_PASSWORD}
    volumes:
      - omniwa-production-postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${OMNIWA_POSTGRES_USER} -d ${OMNIWA_POSTGRES_DATABASE:-omniwa}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    environment:
      OMNIWA_REDIS_PASSWORD: ${OMNIWA_REDIS_PASSWORD:?Set OMNIWA_REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${OMNIWA_REDIS_PASSWORD:?Set OMNIWA_REDIS_PASSWORD}",
      ]
    restart: unless-stopped
    volumes:
      - omniwa-production-redis:/data
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli -a "$${OMNIWA_REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  omniwa-production-data:
  omniwa-production-postgres:
  omniwa-production-redis:
