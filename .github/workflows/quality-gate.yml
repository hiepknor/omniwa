name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Lint, Test, Contracts, and Release Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: omniwa
          POSTGRES_PASSWORD: omniwa-local-password
          POSTGRES_USER: omniwa
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U omniwa -d omniwa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PostgreSQL repository contract tests
        env:
          OMNIWA_POSTGRES_TEST_DATABASE_URL: postgresql://omniwa:omniwa-local-password@127.0.0.1:55432/omniwa
        run: pnpm test:postgres

      - name: Run repository quality gate
        run: pnpm check
